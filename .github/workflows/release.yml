name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Windows installer
        shell: powershell
        run: |
          $version = '${{ github.ref_name }}'.TrimStart('v')
          .\windows\build-release.ps1 -Version $version -OutputDirectory dist
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*
          if-no-files-found: error

  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS app and disk image
        run: |
          version="${GITHUB_REF_NAME#v}"
          bash macos/build-app.sh "$version" dist
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: dist/*
          if-no-files-found: error

  publish:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --title "Codex JumpBridge $GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md
