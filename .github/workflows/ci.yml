name: CI

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse PowerShell scripts
        shell: powershell
        run: |
          $files = @(
            'windows/build-release.ps1',
            'windows/install.ps1',
            'windows/setup.ps1',
            'windows/doctor.ps1',
            'windows/repair-thread-assignments.ps1',
            'windows/uninstall.ps1',
            '.github/scripts/windows-clean-install.ps1'
          )
          foreach ($file in $files) {
            $errors = $null
            $ast = [Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $file), [ref]$null, [ref]$errors)
            if ($errors.Count) {
              $errors | Format-List
              exit 1
            }
          }
      - name: Build Windows wrapper
        shell: powershell
        run: |
          .\windows\build.ps1
          $version = .\windows\codex-jumpbridge.exe --codex-jumpbridge-version
          if ($version -ne 'codex-jumpbridge 1.4.4') {
            throw "Unexpected version: $version"
          }
      - name: Rewrite current Codex Desktop SSH payload safely
        shell: powershell
        run: |
          function Quote-Posix([string]$value) {
            $quote = [char]39
            $replacement = "$quote\$quote$quote"
            "$quote$($value.Replace([string]$quote, $replacement))$quote"
          }
          $login = 'CODEX_REMOTE_PAYLOAD="$1"; export CODEX_REMOTE_PAYLOAD; exec /bin/sh -c "$CODEX_REMOTE_PAYLOAD"'
          $gate = "printf '%b' '\107\101\124\105\061\062\063\064'"
          $payload = $gate + '; PATH="${CODEX_INSTALL_DIR:-$HOME/.local/bin}:$PATH"; export PATH; codex app-server proxy'
          $command = "sh -c $(Quote-Posix $login) sh $(Quote-Posix $payload)"
          $assembly = [Reflection.Assembly]::LoadFile(
            (Resolve-Path '.\windows\codex-jumpbridge.exe'))
          $method = $assembly.GetType('CodexJumpBridge').GetMethod(
            'RewriteStreamingProxyCommand',
            [Reflection.BindingFlags]'NonPublic,Static')
          $arguments = [object[]]@($command, 'jump-T208-Ci', $false, $null)
          $rewritten = [string]$method.Invoke($null, $arguments)
          if ([string]$arguments[3] -ne $gate) {
            throw 'Desktop startup gate was not extracted intact'
          }
          if ($rewritten.Contains($gate)) {
            throw 'Desktop startup gate remained trapped inside proxy setup'
          }
          if (-not $rewritten.Contains('exec codex app-server proxy --sock')) {
            throw 'Host-scoped app-server proxy was not inserted'
          }
          if ($rewritten.Contains('history-sync') -or
              $rewritten.Contains('HISTORY_BUSY')) {
            throw 'Runtime history locking was reintroduced'
          }
      - name: Preserve configured SSH alias spelling
        shell: powershell
        run: |
          $work = Join-Path $env:RUNNER_TEMP 'codex-jumpbridge-alias-case'
          New-Item -ItemType Directory -Force -Path $work | Out-Null
          $fakeSource = Join-Path $work 'FakeSsh.cs'
          @'
          using System;
          using System.IO;
          using System.Threading;

          internal static class FakeSsh
          {
              public static int Main(string[] args)
              {
                  if (args.Length == 1 && args[0] == "ordinary-host")
                  {
                      string pidFile = Environment.GetEnvironmentVariable(
                          "CODEX_JUMPBRIDGE_FAKE_PID_FILE");
                      if (String.IsNullOrWhiteSpace(pidFile))
                      {
                          return 91;
                      }
                      File.WriteAllText(pidFile, ProcessId().ToString());
                      Thread.Sleep(Timeout.Infinite);
                      return 0;
                  }
                  if (args.Length != 2 || args[0] != "jump-T208-Ci" || args[1] != "sh")
                  {
                      return 94;
                  }
                  string bootstrap = Console.In.ReadLine();
                  if ((bootstrap ?? "").IndexOf(
                      "history-sync", StringComparison.OrdinalIgnoreCase) >= 0 ||
                      (bootstrap ?? "").IndexOf(
                      "HISTORY_BUSY", StringComparison.OrdinalIgnoreCase) >= 0)
                  {
                      return 90;
                  }
                  const string markerPrefix = "__CODEX_T_SSH_START_";
                  int markerStart = (bootstrap ?? "").IndexOf(
                      markerPrefix,
                      StringComparison.OrdinalIgnoreCase);
                  int markerEnd = markerStart < 0
                      ? -1
                      : bootstrap.IndexOf("; cd", markerStart, StringComparison.Ordinal);
                  if (markerStart < 0 || markerEnd < 0)
                  {
                      return 93;
                  }
                  System.Text.StringBuilder marker = new System.Text.StringBuilder(markerPrefix);
                  for (int i = markerStart + markerPrefix.Length; i < markerEnd; i++)
                  {
                      char value = Char.ToLowerInvariant(bootstrap[i]);
                      if ((value >= '0' && value <= '9') || (value >= 'a' && value <= 'f'))
                      {
                          marker.Append(value);
                      }
                  }
                  if (marker.Length == markerPrefix.Length)
                  {
                      return 92;
                  }
                  Stream output = Console.OpenStandardOutput();
                  byte[] markerBytes = System.Text.Encoding.ASCII.GetBytes(marker + "\n");
                  output.Write(markerBytes, 0, markerBytes.Length);
                  output.Write(new byte[] { 0x81, 0x03, 0x61, 0x62, 0x63 }, 0, 5);
                  output.Flush();
                  return 0;
              }

              private static int ProcessId()
              {
                  return System.Diagnostics.Process.GetCurrentProcess().Id;
              }
          }
          '@ | Set-Content -LiteralPath $fakeSource -Encoding UTF8
          $fakeSsh = Join-Path $work 'fake-ssh.exe'
          & 'C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe' /nologo /target:exe "/out:$fakeSsh" $fakeSource
          if ($LASTEXITCODE -ne 0) { throw 'Could not build fake SSH test helper' }

          $hostsDir = Join-Path $HOME '.codex-jumpbridge'
          $hostsPath = Join-Path $hostsDir 'hosts.txt'
          $hostsBackup = Join-Path $work 'hosts.txt.backup'
          $hadHosts = Test-Path -LiteralPath $hostsPath
          if ($hadHosts) { Copy-Item -LiteralPath $hostsPath -Destination $hostsBackup }
          $oldRealSsh = $env:CODEX_JUMPBRIDGE_REAL_SSH
          $oldFakePidFile = $env:CODEX_JUMPBRIDGE_FAKE_PID_FILE
          try {
            New-Item -ItemType Directory -Force -Path $hostsDir | Out-Null
            [IO.File]::WriteAllLines($hostsPath, [string[]]@('jump-T208-Ci'), [Text.UTF8Encoding]::new($false))
            $env:CODEX_JUMPBRIDGE_REAL_SSH = $fakeSsh
            $emptyInput = Join-Path $work 'empty-input'
            New-Item -ItemType File -Force -Path $emptyInput | Out-Null
            $actual = Join-Path $work 'actual.bin'
            $stderr = Join-Path $work 'stderr.txt'
            $process = Start-Process -FilePath (Resolve-Path '.\windows\codex-jumpbridge.exe') `
              -ArgumentList @('jump-t208-ci', 'codex app-server proxy') `
              -RedirectStandardInput $emptyInput -RedirectStandardOutput $actual `
              -RedirectStandardError $stderr -NoNewWindow -Wait -PassThru
            if ($process.ExitCode -ne 0) {
              throw "Wrapper exited $($process.ExitCode): $(Get-Content -Raw $stderr)"
            }
            $actualBytes = [IO.File]::ReadAllBytes($actual)
            $expectedBytes = [byte[]](0x81, 0x03, 0x61, 0x62, 0x63)
            if ($actualBytes.Length -ne $expectedBytes.Length -or
                -not [Linq.Enumerable]::SequenceEqual($actualBytes, $expectedBytes)) {
              $actualHex = [BitConverter]::ToString($actualBytes)
              throw "Wrapper did not preserve the raw proxy stream: length=$($actualBytes.Length), hex=$actualHex"
            }

            $fakePidFile = Join-Path $work 'fake-ssh.pid'
            $env:CODEX_JUMPBRIDGE_FAKE_PID_FILE = $fakePidFile
            $wrapperProcess = Start-Process -FilePath (Resolve-Path '.\windows\codex-jumpbridge.exe') `
              -ArgumentList 'ordinary-host' -NoNewWindow -PassThru
            try {
              $deadline = [DateTime]::UtcNow.AddSeconds(10)
              while (-not (Test-Path -LiteralPath $fakePidFile) -and
                  [DateTime]::UtcNow -lt $deadline) {
                Start-Sleep -Milliseconds 100
              }
              if (-not (Test-Path -LiteralPath $fakePidFile)) {
                throw 'Fake SSH child did not start'
              }
              $fakeProcessId = [int](Get-Content -Raw $fakePidFile)
              if (-not (Get-Process -Id $fakeProcessId -ErrorAction SilentlyContinue)) {
                throw 'Fake SSH child exited before lifecycle test'
              }
              Stop-Process -Id $wrapperProcess.Id -Force
              $deadline = [DateTime]::UtcNow.AddSeconds(10)
              while ((Get-Process -Id $fakeProcessId -ErrorAction SilentlyContinue) -and
                  [DateTime]::UtcNow -lt $deadline) {
                Start-Sleep -Milliseconds 100
              }
              if (Get-Process -Id $fakeProcessId -ErrorAction SilentlyContinue) {
                Stop-Process -Id $fakeProcessId -Force -ErrorAction SilentlyContinue
                throw 'Fake SSH child survived wrapper termination'
              }
            } finally {
              if (-not $wrapperProcess.HasExited) {
                Stop-Process -Id $wrapperProcess.Id -Force -ErrorAction SilentlyContinue
              }
            }
          } finally {
            $env:CODEX_JUMPBRIDGE_REAL_SSH = $oldRealSsh
            $env:CODEX_JUMPBRIDGE_FAKE_PID_FILE = $oldFakePidFile
            if ($hadHosts) { Copy-Item -LiteralPath $hostsBackup -Destination $hostsPath -Force }
            else { Remove-Item -LiteralPath $hostsPath -Force -ErrorAction SilentlyContinue }
            Remove-Item -LiteralPath $work -Recurse -Force -ErrorAction SilentlyContinue
          }
      - name: Build Windows installer
        shell: powershell
        run: |
          if (Test-Path -LiteralPath 'shared\history-sync.py') {
            throw 'Removed history lock helper is still present'
          }
          $builder = Get-Content -LiteralPath 'windows\build-release.ps1' -Raw
          if ($builder -match 'history-sync') {
            throw 'Windows package builder still references the history lock helper'
          }
          .\windows\build-release.ps1 -OutputDirectory dist
      - name: Install Windows from zero and run doctor
        shell: powershell
        run: .\.github\scripts\windows-clean-install.ps1
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Check shell syntax
        run: |
          bash -n macos/codex-jumpbridge.sh macos/install.sh \
            macos/app-launcher.sh macos/build-app.sh \
            macos/setup-macos.sh macos/doctor-macos.sh \
            macos/repair-thread-assignments.sh macos/uninstall.sh \
            shared/remote-prepare.sh \
            .github/scripts/macos-clean-install.sh
      - name: Check native history migration
        run: |
          set -eu
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          export HOME="$work/home"
          bundle="$HOME/.vscode-server/extensions/openai.chatgpt-fixture/bin/linux-x86_64"
          mkdir -p "$bundle"
          cat > "$bundle/codex" <<'EOF'
          #!/bin/sh
          if [ "$1" = '--version' ]; then
            printf 'codex-cli fixture\n'
          fi
          EOF
          cat > "$bundle/codex-code-mode-host" <<'EOF'
          #!/bin/sh
          exit 0
          EOF
          chmod 755 "$bundle/codex" "$bundle/codex-code-mode-host"

          master="$HOME/.codex-jumpbridge/history/master"
          native="$HOME/.codex"
          mkdir -p "$master/sessions/2026/07/14" "$native/sessions/2026/07/14"
          printf 'from-master\n' > "$master/sessions/2026/07/14/migrated.jsonl"
          printf 'native-original\n' > "$native/sessions/2026/07/14/existing.jsonl"
          printf 'master-would-overwrite\n' > "$master/sessions/2026/07/14/existing.jsonl"
          printf '%s\n' '{"id":"migrated-id"}' > "$master/session_index.jsonl"
          printf '%s\n' '{"id":"native-id"}' > "$native/session_index.jsonl"

          bash shared/remote-prepare.sh > "$work/first.out"
          grep -q 'CODEX_JUMPBRIDGE_NATIVE_HISTORY=MIGRATED' "$work/first.out"
          test "$(cat "$native/sessions/2026/07/14/migrated.jsonl")" = 'from-master'
          test "$(cat "$native/sessions/2026/07/14/existing.jsonl")" = 'native-original'
          grep -q '"id":"migrated-id"' "$native/session_index.jsonl"
          test -f "$native/.jumpbridge-native-history-v1.4.2"

          bash shared/remote-prepare.sh > "$work/second.out"
          test "$(grep -c '"id":"migrated-id"' "$native/session_index.jsonl")" -eq 1
      - name: Exercise wrapper with the macOS system Bash
        run: |
          set -eu
          if grep -En '\$\{[^}]*,,|\$\{[^}]*\^\^' macos/*.sh; then
            echo 'Bash 4 case conversion is not supported by macOS /bin/bash.' >&2
            exit 1
          fi
          test "$(/bin/bash macos/codex-jumpbridge.sh --codex-jumpbridge-version)" = \
            'codex-jumpbridge 1.4.4'

          functions="$(sed -n '/^posix_quote()/,/^make_token()/p' \
            macos/codex-jumpbridge.sh | sed '$d')"
          eval "$functions"
          login='CODEX_REMOTE_PAYLOAD="$1"; export CODEX_REMOTE_PAYLOAD; exec /bin/sh -c "$CODEX_REMOTE_PAYLOAD"'
          gate="printf '%b' '\107\101\124\105\061\062\063\064'"
          payload="$gate"'; PATH="${CODEX_INSTALL_DIR:-$HOME/.local/bin}:$PATH"; export PATH; codex app-server proxy'
          command="sh -c $(posix_quote "$login") sh $(posix_quote "$payload")"
          parse_posix_shell_words "$command"
          test "${#PARSED_SHELL_WORDS[@]}" -eq 5
          test "${PARSED_SHELL_WORDS[4]}" = "$payload"
          extract_desktop_startup_gate "${PARSED_SHELL_WORDS[4]}"
          test "$DESKTOP_STARTUP_GATE" = "$gate"
          test "$DESKTOP_PROXY_PAYLOAD" = \
            'PATH="${CODEX_INSTALL_DIR:-$HOME/.local/bin}:$PATH"; export PATH; codex app-server proxy'

          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          cat > "$work/fake-ssh" <<'EOF'
          #!/bin/bash
          test "$1" = 'Fixture' || exit 94
          test "$2" = 'sh' || exit 95
          IFS= read -r bootstrap
          case "$bootstrap" in
            *'__SECURE_RUN__'*|*'>codex app-server proxy2'*|*'codex app-server proxycodex'*|*history-sync*|*HISTORY_BUSY*)
              exit 93
              ;;
          esac
          marker_tail="${bootstrap#*__CODEX_JUMPBRIDGE_}"
          marker_tail="${marker_tail%%; cd*}"
          marker_tail="$(printf '%s' "$marker_tail" | tr -cd '[:alnum:]_')"
          marker="__CODEX_JUMPBRIDGE_${marker_tail}"
          test -n "$marker_tail" || exit 93
          printf 'gateway banner\r\n%s\r\n' "$marker"
          if [ "${FAKE_SSH_EXIT:-0}" -eq 87 ]; then
            exit 87
          fi
          printf '\201\003abc'
          EOF
          chmod 755 "$work/fake-ssh"
          printf '\201\003abc' > "$work/expected"
          CODEX_JUMPBRIDGE_HOSTS=Fixture \
            CODEX_JUMPBRIDGE_REAL_SSH="$work/fake-ssh" \
            /bin/bash macos/codex-jumpbridge.sh \
            fixture 'codex app-server proxy' </dev/null > "$work/actual"
          cmp "$work/expected" "$work/actual"

          set +e
          CODEX_JUMPBRIDGE_HOSTS=Fixture \
            CODEX_JUMPBRIDGE_REAL_SSH="$work/fake-ssh" \
            FAKE_SSH_EXIT=87 \
            /bin/bash macos/codex-jumpbridge.sh \
            fixture 'codex app-server proxy' </dev/null > "$work/busy"
          rc=$?
          set -e
          test "$rc" -eq 87
          test ! -s "$work/busy"
      - name: Build macOS app and disk image
        run: bash macos/build-app.sh 1.4.4 dist
      - name: Install macOS from zero and run doctor
        run: bash .github/scripts/macos-clean-install.sh
